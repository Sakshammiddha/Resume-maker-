const STRONG_VERBS = ["Engineered", "Architected", "Spearheaded", "Orchestrated", "Designed", "Optimized", "Scaled", "Automated", "Deployed", "Implemented", "Developed"];
const WEAK_VERBS = ["worked on", "helped with", "was responsible for", "assisted", "participated in"];

// 2. ATS EVALUATION ENGINE
function calcATS(form, selectedCompanies) {
  let score = 0;
  const issues = [];
  const wins = [];

  if (form.name) score += 3; else issues.push("Add your full name");
  if (form.email) score += 4; else issues.push("Add email address");
  if (form.phone) score += 4; else issues.push("Add phone number");
  if (form.location) score += 2; else issues.push("Add city/location");
  if (form.linkedin) { score += 2; wins.push("LinkedIn URL present"); }
  if (form.role) score += 5; else issues.push("Add target role/title");
  
  if (form.summary && form.summary.length > 40) { score += 5; wins.push("Summary looks good"); }

  const skills = form.skills.split(",").map(s => s.trim()).filter(Boolean);
  if (skills.length >= 6) { score += 10; wins.push(`${skills.length} skills listed`); }
  else { issues.push("Add more skills (aim for 6+)"); }

  const exps = form.experience.filter(e => e.company || e.role);
  const projs = form.projects.filter(p => p.title);

  // Relax work experience rule if Student is part of selection profile
  if (selectedCompanies.includes("Student")) {
    if (exps.length > 0 || projs.length > 0) {
      score += 15;
      wins.push("Academic projects or training records found");
    } else {
      issues.push("Add at least one academic project or training detail");
    }
  } else {
    if (exps.length > 0) {
      score += 15;
      wins.push("Experience details present");
    } else {
      issues.push("Add at least one work/internship experience item");
    }
  }

  if (projs.length >= 2) { score += 10; wins.push(`${projs.length} projects listed`); }
  else { issues.push("Aim for at least 2 detailed technical projects"); }

  const edus = form.education.filter(e => e.institution || e.degree);
  if (edus.length > 0) { score += 10; wins.push("Education credentials present"); }
  else { issues.push("Add your college/school education details"); }

  if (selectedCompanies.length > 0) {
    const allText = (form.summary + " " + form.skills + " " + form.experience.map(e => e.description).join(" ") + " " + form.projects.map(p => p.title + " " + p.problem).join(" ")).toLowerCase();
    
    let combinedKeywords = [];
    selectedCompanies.forEach(co => {
      combinedKeywords = [...combinedKeywords, ...COMPANY_PROFILES[co].keywords];
    });
    // Distinct values
    combinedKeywords = [...new Set(combinedKeywords)];

    const matched = combinedKeywords.filter(k => allText.includes(k.toLowerCase()));
    if (matched.length >= Math.min(4, combinedKeywords.length)) {
      score += 16;
      wins.push(`${matched.length} cross-profile keyword targets met`);
    } else {
      issues.push(`Target more stack profile tags (${selectedCompanies.join(", ")})`);
    }
  }

  score = Math.min(100, score);
  const grade = score >= 85 ? "A" : score >= 70 ? "B" : score >= 55 ? "C" : "D";
  const label = score >= 85 ? "ATS Compliant" : score >= 70 ? "Good" : score >= 55 ? "Needs Work" : "Incomplete";

  return { score, grade, label, issues: issues.slice(0, 5), wins: wins.slice(0, 4) };
}

// 3. GENERATION AUTOMATION ENHANCEMENTS
function enhanceBullet(desc, role, selectedCompanies) {
  if (!desc || desc.trim().length < 5) return "Developed software layers, designed core logic routines, and validated framework performance.";
  let out = desc.trim();

  WEAK_VERBS.forEach(w => {
    const re = new RegExp(`^${w}\\b`, "i");
    out = out.replace(re, "Spearheaded design and implementation of");
  });

  if (selectedCompanies.length > 0) {
    // Pick first available boost statement from active criteria layers
    const primaryTarget = selectedCompanies[selectedCompanies.length - 1];
    const randomBoost = COMPANY_PROFILES[primaryTarget].boost[0];
    if (!out.toLowerCase().includes(randomBoost.split(" ")[0])) {
      out = out.replace(/[.,]?\s*$/, "") + ` and successfully ${randomBoost}`;
    }
  }

  return out.charAt(0).toUpperCase() + out.slice(1);
}

function buildProjectBullet(p, selectedCompanies) {
  const tech = p.tech ? ` using ${p.tech}` : "";
  const prob = p.problem ? ` to solve ${p.problem}` : "";
  const built = p.built ? `, building ${p.built}` : "";
  const result = p.result ? `, resulting in ${p.result}` : ".";

  return `Architected ${p.title}${tech}${prob}${built}${result}`;
}

function generateSummary(form, selectedCompanies) {
  if (form.summary && form.summary.trim().length > 30) return form.summary;

  const skills = form.skills.split(",").slice(0, 3).map(s => s.trim()).filter(Boolean);
  const targetRole = form.role || "Software Engineering Enthusiast";

  let base = `Detail-oriented engineer and aspiring ${targetRole}`;
  if (skills.length > 0) base += ` with foundational specialization in ${skills.join(", ")}`;
  base += `. Competent in software development principles, operational algorithms, and scalable framework logic. Proven through practical deliverables and cross-functional design builds.`;

  const corporateTargets = selectedCompanies.filter(c => c !== "Student");
  if (corporateTargets.length > 0) {
    base += ` Target ecosystem tracking focus aimed at development parameters aligned with ${corporateTargets.join(" and ")} infrastructures.`;
  }
  return base;
}

const initForm = {
  name: "", role: "", email: "", phone: "", location: "", linkedin: "", summary: "", skills: "",
  experience: [{ company: "", role: "", duration: "", description: "" }],
  projects: [{ title: "", tech: "", problem: "", built: "", result: "" }],
  education: [{ institution: "", degree: "", year: "" }],
  achievements: ""
};

// Form Field Component
function F({ label, value, onChange, ph, multi }) {
  return (
    <div className="field">
      <label>{label}</label>
      {multi ? (
        <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={ph} rows={3} />
      ) : (
        <input value={value} onChange={e => onChange(e.target.value)} placeholder={ph} />
      )}
    </div>
  );
}

// Live ATS Feedback Component
function ATSPanel({ form, selectedCompanies }) {
  const { score, grade, label, issues, wins } = calcATS(form, selectedCompanies);
  const color = score >= 85 ? "#C8F56A" : score >= 70 ? "#7B6FFF" : score >= 55 ? "#FF9900" : "#FF6B6B";
  
  return (
    <div className="ats-panel">
      <div style={{ fontSize: "8px", letterSpacing: "4px", color: "var(--sub)", marginBottom: "16px", textTransform: "uppercase" }}>
        ATS Evaluation Output
      </div>
      <div className="ats-top">
        <div className="ats-ring" style={{ borderColor: color }}>
          <div className="ats-num" style={{ color }}>{score}</div>
          <div className="ats-sub">/100</div>
        </div>
        <div className="ats-bar-wrap">
          <div className="ats-bar-labels">
            <span style={{ color }}>{label}</span>
            <span>Grade: <span className="ats-grade" style={{ color }}>{grade}</span></span>
          </div>
          <div className="ats-bar-bg">
            <div className="ats-bar-fill" style={{ width: `${score}%`, backgroundColor: color }}></div>
          </div>
          <div className="ats-info">
            {selectedCompanies.length === 0 
              ? "Select target strategy layers above to align metrics engines dynamically." 
              : `Calibrating tracking matrix against ${selectedCompanies.length} active profile layouts.`}
          </div>
        </div>
      </div>
      <div className="ats-cols">
        <div>
          <div className="ats-col-t" style={{ color: "#FF6B6B" }}>▲ Fix These</div>
          {issues.length === 0 ? (
            <div className="ats-item" style={{ color: "#C8F56A" }}>✓ No critical execution gaps found</div>
          ) : (
            issues.map((iss, i) => <div key={i} className="ats-item">⚠️ {iss}</div>)
          )}
        </div>
        <div>
          <div className="ats-col-t" style={{ color: "#C8F56A" }}>✓ Optimizations Present</div>
          {wins.length === 0 ? (
            <div className="ats-item" style={{ color: "var(--sub)" }}>Provide metrics to unlock tokens.</div>
          ) : (
            wins.map((w, i) => <div key={i} className="ats-item" style={{ color: "#C8F56A" }}>★ {w}</div>)
          )}
        </div>
      </div>
    </div>
  );
}

// Primary Core Component Engine
function App() {
  const [form, setForm] = useState(initForm);
  const [selectedCompanies, setSelectedCompanies] = useState([]);
  const [generated, setGenerated] = useState(false);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  
  const updArr = (arr, i, k, v) => {
    const a = [...form[arr]];
    a[i] = { ...a[i], [k]: v };
    setForm(f => ({ ...f, [arr]: a }));
  };

  const addArr = (arr, blank) => setForm(f => ({ ...f, [arr]: [...f[arr], blank] }));
  const rmArr = (arr, i) => setForm(f => ({ ...f, [arr]: f[arr].filter((_, idx) => idx !== i) }));

  // Handle Multi-Select Toggles
  const handleCompanyToggle = (name) => {
    setSelectedCompanies(prev => {
      if (prev.includes(name)) {
        return prev.filter(c => c !== name);
      } else {
        return [...prev, name];
      }
    });
  };

  const skills = form.skills.split(",").map(s => s.trim()).filter(Boolean);
  const canGenerate = form.name.trim().length > 0 && form.role.trim().length > 0;

  if (generated) {
    const summary = generateSummary(form, selectedCompanies);
    const exps = form.experience.filter(e => e.company || e.role);
    const projs = form.projects.filter(p => p.title);
    const edus = form.education.filter(e => e.institution || e.degree);

    return (
      <div className="app">
        <style>{css}</style>
        <div className="shell">
          <div className="out-label">Resume Generated {selectedCompanies.length > 0 ? `(Calibrated)` : ""}</div>
          <div className="out-bar">
            <button className="btn btn-ghost" onClick={() => setGenerated(false)}>Return to Editor</button>
            <button className="btn btn-ghost" onClick={() => { setForm(initForm); setSelectedCompanies([]); setGenerated(false); }}>Clear All</button>
            <button className="btn btn-accent" onClick={() => window.print()}>Print / Export PDF</button>
          </div>
          
          {/* PRISTINE CLEAN WHITE RESUME OUTPUT SHEET */}
          <div className="resume">
            {selectedCompanies.length > 0 && (
              <div className="r-co-badges">
                {selectedCompanies.map(co => (
                  <span key={co} className="r-co-badge">✓ {co} Calibration Layer</span>
                ))}
              </div>
            )}
            
            <div className="r-hd">
              <div className="r-name">{form.name}</div>
              <div className="r-role">{form.role}</div>
              <div className="r-contacts">
                {form.email && <span>{form.email}</span>}
                {form.phone && <span>• {form.phone}</span>}
                {form.location && <span>• {form.location}</span>}
                {form.linkedin && <span>• {form.linkedin}</span>}
              </div>
            </div>

            <div className="r-sec">
              <div className="r-sec-t">Professional Summary</div>
              <div className="r-summary">{summary}</div>
            </div>

            {skills.length > 0 && (
              <div className="r-sec">
                <div className="r-sec-t">Technical Competencies</div>
                <div className="r-skills">
                  {skills.map((s, i) => <span key={i} className="r-skill">{s}</span>)}
                </div>
              </div>
            )}

            {exps.length > 0 && (
              <div className="r-sec">
                <div className="r-sec-t">Professional Background / Training</div>
                {exps.map((e, i) => (
                  <div key={i} className="r-exp-item">
                    <div className="r-exp-header">
                      <span className="r-exp-role">{e.role}</span>
                      <span>{e.duration}</span>
                    </div>
                    <div className="r-exp-meta">
                      <span>{e.company}</span>
                    </div>
                    <div className="r-exp-desc">{enhanceBullet(e.description, e.role, selectedCompanies)}</div>
                  </div>
                ))}
              </div>
            )}

            {projs.length > 0 && (
              <div className="r-sec">
                <div className="r-sec-t">Technical Academic Projects</div>
                {projs.map((p, i) => (
                  <div key={i} className="r-proj-item">
                    <div className="r-proj-title-bar">
                      <span className="r-proj-title">{p.title}</span>
                      {p.tech && <span className="r-proj-tech">{p.tech}</span>}
                    </div>
                    <div className="r-proj-desc">{buildProjectBullet(p, selectedCompanies)}</div>
                  </div>
                ))}
              </div>
            )}

            {edus.length > 0 && (
              <div className="r-sec">
                <div className="r-sec-t">Education</div>
                {edus.map((e, i) => (
                  <div key={i} className="r-exp-item">
                    <div className="r-exp-header">
                      <span>{e.degree}</span>
                      <span>{e.year}</span>
                    </div>
                    <div className="r-exp-meta">
                      <span>{e.institution}</span>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {form.achievements && (
              <div className="r-sec">
                <div className="r-sec-t">Achievements, Certifications & Extracurriculars</div>
                <div className="r-summary" style={{ background: "transparent", padding: 0, border: "none" }}>
                  {form.achievements}
                </div>
              </div>
            )}
          </div>
          <div className="print-hint">To save cleanly, trigger print settings (Cmd+P or Ctrl+P) and choose "Save as PDF".</div>
        </div>
      </div>
    );
  }

  return (
    <div className="app">
      <style>{css}</style>
      <div className="shell">
        <div className="topbar">
          <div className="brand">
            <div className="brand-dot"/>
            <div>
              <div className="brand-name">ResumeOS</div>
              <div className="brand-tag">ATS-Optimized Builder</div>
            </div>
          </div>
        </div>

        <div className="hero">
          <div className="hero-kicker">Workspace Editor</div>
          <div className="hero-h">Build a resume<br/>that <em>gets hired.</em></div>
          <div className="hero-sub">ATS tracking profiles, company phrase injectors, and metrics calibration tools.</div>
        </div>

        {/* 01 Basic Info */}
        <div className="sec">
          <div className="sec-head"><span className="sec-n">01</span><span className="sec-title">Basic Credentials</span><div className="sec-line"></div></div>
          <div className="grid2">
            <F label="Full Name *" value={form.name} onChange={v => set("name", v)} ph="Arjun Mehta" />
            <F label="Target Role *" value={form.role} onChange={v => set("role", v)} ph="Software Engineer Intern / Graduate Associate" />
          </div>
          <div className="grid3">
            <F label="Email" value={form.email} onChange={v => set("email", v)} ph="arjun@email.com" />
            <F label="Phone" value={form.phone} onChange={v => set("phone", v)} ph="+91 98765 43210" />
            <F label="Location" value={form.location} onChange={v => set("location", v)} ph="Bangalore, India" />
          </div>
          <F label="LinkedIn URL" value={form.linkedin} onChange={v => set("linkedin", v)} ph="linkedin.com/in/username" />
        </div>

        {/* 02 Company Optimizer (MULTI SELECT) */}
        <div className="sec">
          <div className="sec-head"><span className="sec-n">02</span><span className="sec-title">Target Ecosystem Calibration</span><div className="sec-line"></div></div>
          <div style={{ fontSize: 11, color: "var(--sub)", marginBottom: 16, lineHeight: 1.6 }}>
            Select your matching target strategies. You can tap **Student** and simultaneously pick one or more target corporate tracks to overlay key phrase metrics.
          </div>
          <div className="co-grid">
            {Object.entries(COMPANY_PROFILES).map(([name, p]) => {
              const isSelected = selectedCompanies.includes(name);
              return (
                <div key={name} className={`co-btn ${isSelected ? "active" : ""}`}
                     onClick={() => handleCompanyToggle(name)}
                     style={isSelected ? { borderColor: p.color } : {}}>
                  <div className="co-check">✓</div>
                  <div className="co-icon">{p.emoji}</div>
                  <div className="co-name">{name}</div>
                </div>
              );
            })}
          </div>
          {selectedCompanies.length > 0 && (
            <div className="co-tip">
              <strong>Combined Active Targets:</strong> {selectedCompanies.join(", ")}
              <div className="co-kws">
                {selectedCompanies.flatMap(co => COMPANY_PROFILES[co].keywords).filter((v, i, a) => a.indexOf(v) === i).slice(0, 8).map((k, i) => (
                  <span key={i} className="co-kw">{k}</span>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* 03 Summary */}
        <div className="sec">
          <div className="sec-head"><span className="sec-n">03</span><span className="sec-title">Professional Summary</span><div className="sec-line"></div></div>
          <F label="Summary Statement (Leave blank to let compiler auto-generate using your multi-select tracking filters)" value={form.summary} onChange={v => set("summary", v)} ph="Optional baseline brief summary description context..." multi />
        </div>

        {/* 04 Skills */}
        <div className="sec">
          <div className="sec-head"><span className="sec-n">04</span><span className="sec-title">Core Competencies</span><div className="sec-line"></div></div>
          <F label="Skills Suite (Comma Separated - aim for tags like Data Structures, Python, etc.)" value={form.skills} onChange={v => set("skills", v)} ph="Data Structures, Algorithms, Java, React, Git" />
          {skills.length > 0 && (
            <div className="skill-preview">
              {skills.map((s, i) => <span key={i} className="skill-chip">{s}</span>)}
            </div>
          )}
        </div>

        {/* 05 Experience */}
        <div className="sec">
          <div className="sec-head"><span className="sec-n">05</span><span className="sec-title">Work Experience / Training / Bootcamp History</span><div className="sec-line"></div></div>
          {form.experience.map((e, i) => (
            <div key={i} className="card">
              <div className="card-badge">EXP ITEM {String(i + 1).padStart(2, "0")}</div>
              {form.experience.length > 1 && <button className="btn-rm" onClick={() => rmArr("experience", i)}>Remove</button>}
              <div className="grid2" style={{ marginTop: 10 }}>
                <F label="Organization / College Lab" value={e.company} onChange={v => updArr("experience", i, "company", v)} ph="Tech Institute Bootcamps / Freelance" />
                <F label="Your Title / Role" value={e.role} onChange={v => updArr("experience", i, "role", v)} ph="Software Trainee / Student Developer" />
              </div>
              <F label="Duration Windows" value={e.duration} onChange={v => updArr("experience", i, "duration", v)} ph="Summer 2025" />
              <F label="Key Contributions & Learning Scope" value={e.description} onChange={v => updArr("experience", i, "description", v)} ph="Learned core database architectures and assisted with building..." multi />
            </div>
          ))}
          <button className="btn-add" onClick={() => addArr("experience", { company: "", role: "", duration: "", description: "" })}>+ Add Record Field</button>
        </div>

        {/* 06 Projects */}
        <div className="sec">
          <div className="sec-head"><span className="sec-n">06</span><span className="sec-title">Technical Projects (Highly Critical for Students)</span><div className="sec-line"></div></div>
          {form.projects.map((p, i) => (
            <div key={i} className="card">
              <div className="card-badge">PROJECT ITEM {String(i + 1).padStart(2, "0")}</div>
              {form.projects.length > 1 && <button className="btn-rm" onClick={() => rmArr("projects", i)}>Remove</button>}
              <div className="grid2" style={{ marginTop: 10 }}>
                <F label="Project Identifier *" value={p.title} onChange={v => updArr("projects", i, "title", v)} ph="E-Commerce Database Layer" />
                <F label="Tech Framework Stack" value={p.tech} onChange={v => updArr("projects", i, "tech", v)} ph="Python, MySQL, Flask" />
              </div>
              <F label="Problem Space Solved" value={p.problem} onChange={v => updArr("projects", i, "problem", v)} ph="unstructured data storage requirements" />
              <F label="Core Code/Infrastructure Built" value={p.built} onChange={v => updArr("projects", i, "built", v)} ph="a normalized relational schema with indexing layers" />
              <F label="Result / Achievement Outcome" value={p.result} onChange={v => updArr("projects", i, "result", v)} ph="passing all grading evaluation units perfectly" />
            </div>
          ))}
          <button className="btn-add" onClick={() => addArr("projects", { title: "", tech: "", problem: "", built: "", result: "" })}>+ Add Project Architecture Card</button>
        </div>

        {/* 07 Education */}
        <div className="sec">
          <div className="sec-head"><span className="sec-n">07</span><span className="sec-title">Academic Baseline</span><div className="sec-line"></div></div>
          {form.education.map((e, i) => (
            <div key={i} className="card">
              <div className="card-badge">EDU ITEM {String(i + 1).padStart(2, "0")}</div>
              {form.education.length > 1 && <button className="btn-rm" onClick={() => rmArr("education", i)}>Remove</button>}
              <div className="grid3" style={{ marginTop: 10 }}>
                <F label="Institution / University" value={e.institution} onChange={v => updArr("education", i, "institution", v)} ph="XYZ University" />
                <F label="Degree Course" value={e.degree} onChange={v => updArr("education", i, "degree", v)} ph="B.Tech Computer Science (CGPA: 8.9)" />
                <F label="Graduation / Passing Year" value={e.year} onChange={v => updArr("education", i, "year", v)} ph="2026" />
              </div>
            </div>
          ))}
          <button className="btn-add" onClick={() => addArr("education", { institution: "", degree: "", year: "" })}>+ Add Education Milestones</button>
        </div>

        {/* 08 Achievements */}
        <div className="sec">
          <div className="sec-head"><span className="sec-n">08</span><span className="sec-title">Certifications, Honors & Hackathons</span><div className="sec-line"></div></div>
          <F label="Awards, Certifications, Extracurricular positions" value={form.achievements} onChange={v => set("achievements", v)} ph="Ranked Top 5% in Smart India Hackathon, Coursera Algorithm Certificate, Coding Club Core Member..." multi />
        </div>

        <ATSPanel form={form} selectedCompanies={selectedCompanies} />

        <div className="action-row">
          <button className="btn btn-accent" onClick={() => setGenerated(true)} disabled={!canGenerate}>
            Compile Document Blueprints
          </button>
          {!canGenerate && <div className="req-note">* Identity Name and Target Role are required parameters to initialize structural builds.</div>}
        </div>
      </div>
    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);
</script>

</body>
</html>
